[phases.setup]
nixPkgs = [
  "chromium",
  "glib",
  "nss",
  "atk",
  "cups",
  "gtk3",
  "pango",
  "cairo",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "libxkbcommon",
  "mesa",
  "alsa-lib"
]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "python -m playwright install chromium --with-deps"
]
